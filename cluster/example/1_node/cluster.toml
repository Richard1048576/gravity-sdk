# Gravity Cluster Configuration - 1 Validator
# Node deployment configuration only

[cluster]
name = "gravity-devnet-one"
base_dir = "/tmp/gravity-cluster-one"

[build]
binary_path = "../target/quick-release/gravity_node"

[genesis_source]
genesis_path = "./output/genesis.json"
waypoint_path = "./output/waypoint.txt"

[[nodes]]
id = "node1"
role = "genesis"
host = "127.0.0.1"
p2p_port = 6180
vfn_port = 6190
rpc_port = 8545
metrics_port = 9001
inspection_port = 10000
https_port = 1024
authrpc_port = 8551
reth_p2p_port = 12024

[faucet_init]
num_accounts = 10000
