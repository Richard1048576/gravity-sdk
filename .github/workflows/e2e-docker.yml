name: E2E Test in Docker

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run (empty = all)'
        required: false
        default: ''

# Queue (don't cancel) redundant runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ==========================================================================
  # Gate – reusable approval + duplicate-run + changed-files check
  # ==========================================================================
  gate:
    name: E2E Gate
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved' &&
       (github.event.pull_request.base.ref == 'main' ||
        startsWith(github.event.pull_request.base.ref, 'gravity-testnet-v')))
    uses: ./.github/workflows/gate.yml
    with:
      workflow_file: e2e-docker.yml
      ignore_patterns: 'book/*|scripts/*|template_config/*|*.md|bin/sentinel/*|genesis/*'

  e2e-test:
    name: E2E Test
    runs-on: [self-hosted, linux]
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    timeout-minutes: 120

    steps:
    - name: Checkout trusted workflow scripts
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.base.sha || github.sha }}
        persist-credentials: false

    - name: Checkout pull request source
      if: github.event_name == 'pull_request_review'
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        path: pr-source
        persist-credentials: false

    - name: Run E2E Tests
      env:
        PR_SOURCE_DIR: ${{ github.workspace }}/pr-source
      run: |
        chmod +x gravity_e2e/run_docker.sh
        if [ "${{ github.event_name }}" = "pull_request_review" ]; then
          GRAVITY_E2E_SOURCE_DIR="$PR_SOURCE_DIR" ./gravity_e2e/run_docker.sh --exclude fuzzy_cluster --exclude rolling_upgrade
        else
          ./gravity_e2e/run_docker.sh ${{ github.event.inputs.suite }}
        fi
