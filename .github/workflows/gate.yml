name: CI Gate

# Reusable workflow: approval gate + duplicate-run check + changed-files filter
on:
  workflow_call:
    inputs:
      workflow_file:
        description: 'Workflow filename for duplicate-run detection (e.g. rust-ci.yml)'
        required: true
        type: string
      ignore_patterns:
        description: >
          Pipe-separated glob patterns to ignore when checking changed files.
          Example: 'book/*|scripts/*|*.md'
        required: true
        type: string
    outputs:
      should_run:
        description: 'Whether downstream jobs should run'
        value: ${{ jobs.gate.outputs.should_run }}

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    # The approval / branch filter is applied by the CALLER's top-level `if`
    # or trigger events, so no extra `if` is needed here.
    outputs:
      should_run: ${{ steps.final.outputs.should_run }}
    steps:
      # ── 1. Duplicate-run check ──────────────────────────────────────────
      - name: Check for duplicate runs
        id: dup
        env:
          GH_TOKEN: ${{ github.token }}
          # Pull all expression inputs through env so potentially-untrusted
          # values (e.g. branch names) can't be interpolated directly into
          # the inline script. See GH Actions script-injection hardening.
          EVENT_NAME: ${{ github.event_name }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          WF: ${{ inputs.workflow_file }}
          THIS_RUN: ${{ github.run_id }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Only the exact PR head SHA is a safe duplicate key. Branch names are
          # attacker-controlled and branch-wide history can include stale runs
          # from previous commits, so do not query or match by branch name here.
          RUN_PAIRS=$(gh api \
            "repos/${REPO}/actions/workflows/${WF}/runs?event=pull_request&per_page=100" \
            --jq "[.workflow_runs[] | select(.id != ${THIS_RUN} and .head_sha == \"${PR_SHA}\" and (.status == \"in_progress\" or .conclusion == \"success\"))] | .[] | \"\(.id) \(.status) \(.conclusion // \"\")\"")

          HAS_REAL_SUCCESS=false
          while IFS=' ' read -r RUN_ID STATUS CONCLUSION; do
            [ -z "$RUN_ID" ] && continue
            if [ "$STATUS" = "in_progress" ]; then
              echo "CI already in progress for PR #${PR_NUMBER} (run #${RUN_ID}, sha ${PR_SHA}). Skipping."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            [ "$CONCLUSION" = "success" ] || continue
            REAL_JOBS=$(gh api \
              "repos/${REPO}/actions/runs/${RUN_ID}/jobs" \
              --jq '[.jobs[] | select(.conclusion == "success" and (.name | test("(?i)gate") | not))] | length')
            if [ "$REAL_JOBS" -gt "0" ]; then
              echo "Found previous run #${RUN_ID} for current PR head sha ${PR_SHA} with real test execution."
              HAS_REAL_SUCCESS=true
              break
            fi
          done <<< "$RUN_PAIRS"

          if [ "$HAS_REAL_SUCCESS" = "true" ]; then
            echo "CI already passed for PR #${PR_NUMBER}. Skipping."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

      # ── 2. Changed-files relevance check ───────────────────────────────
      - name: Check changed files
        id: files
        if: steps.dup.outputs.should_run == 'true' && github.event_name == 'pull_request_review'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IGNORE_PATTERNS: ${{ inputs.ignore_patterns }}
        run: |
          CHANGED_FILES=$(gh api \
            "repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100" \
            --paginate --jq '.[].filename')

          # Split pipe-separated patterns into an array
          IFS='|' read -ra PATTERNS <<< "$IGNORE_PATTERNS"

          HAS_RELEVANT_CHANGES=false
          while IFS= read -r file; do
            IGNORED=false
            for pattern in "${PATTERNS[@]}"; do
              # If pattern ends with /*, match the directory prefix to handle
              # nested files (e.g. bin/sentinel/* should match bin/sentinel/src/main.rs)
              if [[ "$pattern" == *'/*' ]]; then
                prefix="${pattern%/*}/"
                if [[ "$file" == "$prefix"* ]]; then
                  IGNORED=true
                  break
                fi
              elif [[ "$file" == $pattern ]]; then
                IGNORED=true
                break
              fi
            done
            if [ "$IGNORED" = "true" ]; then
              echo "  [IGNORED] ${file}"
            else
              echo "  [RELEVANT] ${file}"
              HAS_RELEVANT_CHANGES=true
            fi
          done <<< "${CHANGED_FILES}"

          if [ "${HAS_RELEVANT_CHANGES}" = "false" ]; then
            echo "All changes are in ignored paths. Skipping."
            echo "has_relevant=false" >> $GITHUB_OUTPUT
          else
            echo "✓ Found relevant code changes."
            echo "has_relevant=true" >> $GITHUB_OUTPUT
          fi

      # ── 3. Final decision ──────────────────────────────────────────────
      - name: Determine final result
        id: final
        env:
          DUP_RESULT: ${{ steps.dup.outputs.should_run }}
          FILE_RESULT: ${{ steps.files.outputs.has_relevant }}
        run: |
          # If dup check already said no, skip
          if [ "$DUP_RESULT" != "true" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # If files check ran and said no relevant changes, skip
          if [ "$FILE_RESULT" = "false" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "should_run=true" >> $GITHUB_OUTPUT
