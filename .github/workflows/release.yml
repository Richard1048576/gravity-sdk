name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    paths:
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (must match v*.*.*, e.g. v1.7.0). The tag and its GitHub Release must already exist.'
        required: true
        type: string

concurrency:
  group: release-${{ github.event.pull_request.number || inputs.tag || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build and release
    runs-on: [self-hosted, linux]
    # Native build on the runner — no container.
    # Invariant: runner OS must match production node OS, otherwise the
    # binary's required glibc may exceed what target nodes provide and
    # they'll fail to start with `GLIBC_X.YY not found`. Verify before
    # changing the runner: `cat /etc/os-release && ldd --version`
    # on both runner and target should agree (or runner glibc ≤ target).
    # Runner must have these installed once:
    #   - rust toolchain matching rust-toolchain.toml (rustup default <ver>)
    #   - gh CLI (`apt install gh` via cli.github.com apt repo)
    #   - build deps: clang llvm libclang-dev build-essential pkg-config
    #                 libudev-dev
    #     (libssl-dev no longer needed — bin/gravity_node and bin/gravity_cli
    #     both vendor OpenSSL via `openssl = { features = ["vendored"] }`,
    #     so openssl-sys self-compiles. Perl is required for the vendored
    #     OpenSSL Configure script; usually present already on Debian.)
    #   - docker (BuildKit enabled) — used by the release docker image step
    #     to wrap the native binary into ghcr.io/galxe/gravity_node:$TAG
    timeout-minutes: 180
    env:
      RUSTFLAGS: "--cfg tokio_unstable"

    steps:
      - name: Validate dispatch tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if ! echo "$INPUT_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z][0-9A-Za-z.-]*)?$'; then
            echo "tag must match v*.*.* (e.g. v1.7.0, v1.7.0-rc1): $INPUT_TAG" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For workflow_dispatch, check out the fully-qualified tag ref instead
          # of an unqualified user input that could be shadowed by a branch. For
          # push/PR, fall back to the default ref (the tag or PR head).
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Show build environment
        # Logs runner OS / glibc / rustc so any future divergence from
        # production OS is visible in the release run record.
        shell: bash
        run: |
          set -euo pipefail
          grep -E '^(NAME|VERSION|VERSION_CODENAME)=' /etc/os-release
          ldd --version | head -1
          rustc --version
          cargo --version

      - name: Assert rustc matches rust-toolchain.toml
        shell: bash
        run: |
          set -euo pipefail
          expected=$(grep -E '^channel[[:space:]]*=' rust-toolchain.toml | sed -E 's/.*"([^"]+)".*/\1/')
          actual=$(rustc --version | awk '{print $2}')
          echo "expected: $expected"
          echo "actual:   $actual"
          if [ "$expected" != "$actual" ]; then
            echo "rustc on runner does not match rust-toolchain.toml." >&2
            echo "update the runner toolchain (rustup install $expected && rustup default $expected) or update rust-toolchain.toml." >&2
            exit 1
          fi

      - name: Build gravity_node and gravity_cli
        shell: bash
        run: |
          set -euo pipefail
          cargo build --profile quick-release --bin gravity_node --bin gravity_cli

      - name: Stage release assets and compute sha256
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          OUT="${RUNNER_TEMP}/release-assets"
          rm -rf "$OUT" && mkdir -p "$OUT"
          for bin in gravity_node gravity_cli; do
            src="target/quick-release/$bin"
            if [ ! -x "$src" ]; then
              echo "$src not built or not executable" >&2
              exit 1
            fi
            cp "$src" "$OUT/$bin"
            ( cd "$OUT" && sha256sum "$bin" > "$bin.sha256" )
          done
          ls -lh "$OUT"
          echo "--- sha256 ---"
          cat "$OUT"/*.sha256
          echo "dir=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload PR dry-run artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-dryrun-${{ github.sha }}
          path: ${{ steps.stage.outputs.dir }}
          if-no-files-found: error
          retention-days: 7

      - name: Build gravity_node docker image
        # Uses the `runtime-host-binary` target of docker/gravity_node/Dockerfile,
        # which COPYs the binary the previous cargo step just produced. BuildKit
        # stage pruning skips the `builder` stage entirely — no double compile.
        # Runs on both PR (build-only, no push) and tag pushes.
        #
        # Note: the repo's .dockerignore excludes `target/` from the build
        # context, so we stage the binary into docker/gravity_node/bin/ (a path
        # that IS in the context) before invoking `docker build`. This matches
        # the pre-existing pattern used by regression/pfn_chain_stress/run.sh.
        shell: bash
        env:
          IMAGE_REF: gravity_node:build-${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p docker/gravity_node/bin
          cp -f target/quick-release/gravity_node docker/gravity_node/bin/gravity_node
          DOCKER_BUILDKIT=1 docker build \
            --target runtime-host-binary \
            --build-arg HOST_BINARY=docker/gravity_node/bin/gravity_node \
            -t "${IMAGE_REF}" \
            -f docker/gravity_node/Dockerfile .
          echo "--- image size ---"
          docker images --format '{{.Repository}}:{{.Tag}} {{.Size}}' | grep "^${IMAGE_REF}"
          # Don't leave the binary in the repo working dir after the build —
          # the runner reuses the checkout between jobs.
          rm -f docker/gravity_node/bin/gravity_node

      - name: Resolve tag
        id: tag
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF##refs/tags/}"
          fi
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z][0-9A-Za-z.-]*)?$'; then
            echo "tag must match v*.*.* (e.g. v1.7.0, v1.7.0-rc1): $TAG" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Upload assets to GitHub release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          ASSETS_DIR: ${{ steps.stage.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG does not exist." >&2
            echo "create it first via GitHub UI (Releases → Draft a new release) with notes, then publish — that will push the tag and re-trigger this workflow." >&2
            exit 1
          fi
          gh release upload "$TAG" \
            "$ASSETS_DIR/gravity_node" \
            "$ASSETS_DIR/gravity_node.sha256" \
            "$ASSETS_DIR/gravity_cli" \
            "$ASSETS_DIR/gravity_cli.sha256" \
            --clobber

      - name: Login to ghcr.io
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "${GH_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Tag and push docker image to ghcr.io
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          BUILT_IMAGE: gravity_node:build-${{ github.sha }}
        run: |
          set -euo pipefail
          # GHCR namespaces are lowercase; convert the github org name to be safe.
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/gravity_node:${TAG}"
          docker tag "${BUILT_IMAGE}" "${IMAGE}"
          docker push "${IMAGE}"
          echo "pushed: ${IMAGE}"
